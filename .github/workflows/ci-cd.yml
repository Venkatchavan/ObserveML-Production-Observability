name: ObserveML CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/observeml-api

jobs:
  lint-python:
    name: Lint Python (API + SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff black
      - run: ruff check api/ sdk/python/ && black --check api/ sdk/python/

  lint-js-sdk:
    name: Lint JavaScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd sdk/javascript && npm ci && npm run lint && npm run type-check

  test-api:
    name: Test FastAPI + ClickHouse
    runs-on: ubuntu-latest
    needs: [lint-python]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: observeml_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      clickhouse:
        image: clickhouse/clickhouse-server:23.8-alpine
        ports:
          - 8123:8123
          - 9000:9000
    env:
      DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/observeml_test
      CLICKHOUSE_URL: http://localhost:8123
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd api && pip install -r requirements.txt
      - run: cd api && pytest tests/ --cov=app --cov-report=xml --cov-fail-under=80
      - uses: codecov/codecov-action@v4

  test-python-sdk:
    name: Test Python SDK (matrix)
    runs-on: ubuntu-latest
    needs: [lint-python]
    strategy:
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: cd sdk/python && pip install -e ".[test]"
      - run: cd sdk/python && pytest tests/ -v

  test-js-sdk:
    name: Test JavaScript SDK
    runs-on: ubuntu-latest
    needs: [lint-js-sdk]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd sdk/javascript && npm ci && npm test -- --coverage

  security-python:
    name: Security Scan Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install bandit "safety<3"
      - run: bandit -r api/app/ sdk/python/observeml/ -ll
      - run: safety check -r api/requirements.txt

  build:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: [test-api, test-python-sdk, test-js-sdk, security-python]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  publish-python-sdk:
    name: Publish Python SDK to PyPI
    runs-on: ubuntu-latest
    needs: [test-python-sdk]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: cd sdk/python && pip install build twine && python -m build
      - run: cd sdk/python && twine upload dist/*
        env:
          TWINE_TOKEN: ${{ secrets.PYPI_API_TOKEN }}

  publish-js-sdk:
    name: Publish JS SDK to npm
    runs-on: ubuntu-latest
    needs: [test-js-sdk]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: cd sdk/javascript && npm ci && npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  deploy-production:
    name: Deploy to Production (Fly.io)
    runs-on: ubuntu-latest
    needs: [build]
    environment: production
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --app observeml-api --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
