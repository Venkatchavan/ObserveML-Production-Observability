version: "3.9"

# OB-10: Docker Compose development environment
# All base images pinned to specific versions (DevOps Law: never use 'latest')

services:
  postgres:
    image: postgres:16.3-alpine3.20
    environment:
      POSTGRES_DB: observeml
      POSTGRES_USER: observeml
      POSTGRES_PASSWORD: observeml
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U observeml -d observeml"]
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24.3.3-alpine
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # native TCP
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "clickhouse-client", "--query", "SELECT 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://observeml:observeml@postgres:5432/observeml
      CLICKHOUSE_HOST: clickhouse
      CLICKHOUSE_PORT: "9000"
      CLICKHOUSE_DATABASE: observeml
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      RATE_LIMIT_PER_MINUTE: "100"
    depends_on:
      postgres:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  clickhouse_data:
